name: Secrets 사용 예제

on:
  workflow_dispatch:  # 수동으로만 실행 (테스트용)
  push:
    branches: [ main ]

jobs:
  use-secret:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # GitHub 저장소 Settings > Secrets에 저장한 값을
      # env 블록을 통해 환경변수로 전달
      - name: Secret을 환경변수로 주입해서 스크립트 실행
        env:
          MY_API_KEY: ${{ secrets.MY_API_KEY }}   # Secrets에서 읽어옴
        run: python secret_example.py

      # 여러 개의 Secret을 동시에 사용하는 예시
      - name: 여러 Secret 사용 예시
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: |
          echo "DB 비밀번호 길이: ${#DB_PASSWORD}"
          echo "Slack 토큰 길이: ${#SLACK_TOKEN}"
          echo "Secret 값 자체는 절대 echo로 출력하면 안 됩니다"
